apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-demo
spec:
  replicas: 2  # I want 2 pods running AT ALL TIMES
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: app
        image: nginx:alpine
        # Add a health check - Kubernetes will use this to know if app is "healthy"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5