apiVersion: apps/v1
kind: Deployment
metadata:
  name: hadoop-cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hadoop
  template:
    metadata:
      labels:
        app: hadoop
    spec:
      containers:
      - name: hadoop
        image: apache/hadoop:3.3.6
        command: ["/bin/bash"]
        args: ["-c", "hdfs namenode -format -force && hdfs namenode"]
        ports:
        - containerPort: 9000
        - containerPort: 9870
        env:
        - name: CLUSTER_NAME
          value: "hdfs-k8s"
        - name: HADOOP_CONF_DIR
          value: "/opt/hadoop/etc/hadoop"
---
apiVersion: v1
kind: Service
metadata:
  name: hadoop-namenode-service
spec:
  selector:
    app: hadoop
  ports:
  - name: hdfs
    port: 9000
    targetPort: 9000
  - name: web
    port: 9870
    targetPort: 9870